<!DOCTYPE html>
<html>
<head>
    <title>Crypto Arbitrage Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        #container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            margin: 15px;
            width: 260px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .coin {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .section {
            margin-top: 10px;
            font-size: 14px;
        }

        .profit {
            font-size: 18px;
            font-weight: bold;
            margin-top: 10px;
        }

        .green { color: #22c55e; }
        .red { color: #ef4444; }
        .neutral { color: #94a3b8; }

        .action {
            margin-top: 5px;
            font-size: 13px;
        }
    </style>
</head>

<body>

<h1>🚀 Crypto Arbitrage Dashboard</h1>

<div id="container"></div>

<script>
const ws = new WebSocket("ws://localhost:8080/ws");

ws.onmessage = (event) => {
    const data = JSON.parse(event.data);

    const container = document.getElementById("container");
    container.innerHTML = "";

    const list = data.opportunities || [];

    if (list.length === 0) {
        container.innerHTML = "<p>No profitable opportunities</p>";
        return;
    }

    list.forEach(item => {

        let profitClass = "neutral";

        if (item.real_profit > 0) {
            profitClass = "green";
        } else if (item.real_profit < 0) {
            profitClass = "red";
        }

        const card = `
            <div class="card">
                <div class="coin">${item.coin}</div>

                <div class="section">
                    <b>Binance</b><br>
                    Bid: ${item.binance_bid}<br>
                    Ask: ${item.binance_ask}
                </div>

                <div class="section">
                    <b>KuCoin</b><br>
                    Bid: ${item.kucoin_bid}<br>
                    Ask: ${item.kucoin_ask}
                </div>

                <div class="profit ${profitClass}">
                    Profit: ${item.real_profit.toFixed(2)}
                </div>

                <div class="action">
                    ${item.action}
                </div>
            </div>
        `;

        container.innerHTML += card;
    });
};

ws.onerror = (err) => {
    console.error("WebSocket error:", err);
};

ws.onclose = () => {
    console.log("WebSocket connection closed");
};
</script>

</body>
</html>
